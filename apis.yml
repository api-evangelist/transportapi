aid: transportapi
name: TransportAPI
description: TransportAPI is a managed data service provider for UK public transport, offering real-time and scheduled bus,
  rail, and multimodal transport data via REST and WebSocket APIs to power apps, websites, analytics, and data-mining workflows.
