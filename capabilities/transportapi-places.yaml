naftiko: 1.0.0-alpha2
info:
  label: TransportAPI — Places
  description: 'TransportAPI — Places. 1 operations. Lead operation: Search Transport Places. Self-contained Naftiko capability
    covering one Transportapi business surface.'
  tags:
  - Transportapi
  - Places
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRANSPORTAPI_API_KEY: TRANSPORTAPI_API_KEY
capability:
  consumes:
  - type: http
    namespace: transportapi-places
    baseUri: https://transportapi.com/v3/uk
    description: TransportAPI — Places business capability. Self-contained, no shared references.
    resources:
    - name: places.json
      path: /places.json
      operations:
      - name: searchplaces
        method: GET
        description: Search Transport Places
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Text search query for place name
        - name: lat
          in: query
          type: number
          description: Latitude for proximity search
        - name: lon
          in: query
          type: number
          description: Longitude for proximity search
        - name: type
          in: query
          type: string
          description: Filter by place type
        - name: radius
          in: query
          type: integer
          description: Search radius in meters
        - name: limit
          in: query
          type: integer
          description: Maximum results to return
        - name: app_id
          in: query
          type: string
        - name: app_key
          in: query
          type: string
    authentication:
      type: apikey
      key: X-App-Id
      value: '{{env.TRANSPORTAPI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: transportapi-places-rest
    port: 8080
    description: REST adapter for TransportAPI — Places. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/places-json
      name: places-json
      description: REST surface for places.json.
      operations:
      - method: GET
        name: searchplaces
        description: Search Transport Places
        call: transportapi-places.searchplaces
        with:
          query: rest.query
          lat: rest.lat
          lon: rest.lon
          type: rest.type
          radius: rest.radius
          limit: rest.limit
          app_id: rest.app_id
          app_key: rest.app_key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: transportapi-places-mcp
    port: 9090
    transport: http
    description: MCP adapter for TransportAPI — Places. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-transport-places
      description: Search Transport Places
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: transportapi-places.searchplaces
      with:
        query: tools.query
        lat: tools.lat
        lon: tools.lon
        type: tools.type
        radius: tools.radius
        limit: tools.limit
        app_id: tools.app_id
        app_key: tools.app_key
      outputParameters:
      - type: object
        mapping: $.
